# =============================================================================
# WCIC — World Cup Intelligence Center
# Docker Compose — ambiente de desenvolvimento e staging
#
# Ordem de inicialização:
#   postgres (healthy) → redis (healthy) → n8n-main → n8n-workers
#   prometheus → grafana
#   api (depende do postgres + redis)
#   metabase (depende do postgres)
# =============================================================================

services:

  # ===========================================================================
  # PostgreSQL 15 + TimescaleDB
  # Banco principal: dados de partidas, eventos, IA, logs
  # Porta exposta apenas localmente —> em produção remover ports e usar rede interna
  # ===========================================================================
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: wcic-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
      POSTGRES_USER: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
      - ./database/migrations:/migrations:ro
      - ./database/seeds:/seeds:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c work_mem=16MB
        -c maintenance_work_mem=64MB
        -c max_connections=200
        -c wal_level=replica
        -c max_wal_senders=3
        -c log_min_duration_statement=1000
        -c log_line_prefix='%t [%p] %u@%d '
    networks:
      - wcic-network

  # ===========================================================================
  # Redis 7
  # Cache, filas (Bull/BullMQ para n8n Queue Mode), rate limiting, dedup, Pub/Sub
  # maxmemory-policy allkeys-lru: quando memória cheia, remove chaves menos usadas
  # appendonly + appendfsync everysec: durabilidade sem impacto grande na performance
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: wcic-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 60 1000
        --appendonly yes
        --appendfsync everysec
        --loglevel notice
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - wcic-network

  # ===========================================================================
  # n8n — Main Instance
  # Responsável por: UI, API, Webhook handling, agendamento de execuções
  # Não executa workflows diretamente em Queue Mode —> delega para workers
  # ===========================================================================
  n8n:
    image: n8nio/n8n:latest
    container_name: wcic-n8n-main
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Banco de dados do n8n (schema separado do WCIC)
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n_app
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_N8N_PASSWORD}
      DB_POSTGRESDB_SCHEMA: public

      # Segurança
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}

      # Queue Mode — n8n principal não executa, apenas agenda
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      QUEUE_BULL_REDIS_DB: 0

      # Webhook
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_EDITOR_BASE_URL: ${WEBHOOK_URL}

      # Logs e métricas
      N8N_LOG_LEVEL: info
      N8N_LOG_OUTPUT: console
      N8N_METRICS: "true"
      N8N_METRICS_PREFIX: wcic_n8n_

      # Timezone
      GENERIC_TIMEZONE: America/Sao_Paulo
      TZ: America/Sao_Paulo

      # Limites
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: none       # Economiza espaço com logs no PostgreSQL wcic
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: "true"
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 336                # 14 dias em horas

    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/workflows:ro   # Workflows disponíveis para import
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wcic-network

  # ===========================================================================
  # n8n Worker 1
  # Executa workflows da fila —> sem UI ou webhooks
  # Escalar horizontalmente adicionando worker-3, worker-4, etc.
  # ===========================================================================
  n8n-worker-1:
    image: n8nio/n8n:latest
    container_name: wcic-n8n-worker-1
    restart: unless-stopped
    command: worker
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n_app
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_N8N_PASSWORD}

      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}

      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      QUEUE_BULL_REDIS_DB: 0
      N8N_CONCURRENCY_PRODUCTION_LIMIT: 20

      GENERIC_TIMEZONE: America/Sao_Paulo
      TZ: America/Sao_Paulo
      N8N_LOG_LEVEL: info
    depends_on:
      - n8n
    networks:
      - wcic-network

  # ===========================================================================
  # n8n Worker 2
  # ===========================================================================
  n8n-worker-2:
    image: n8nio/n8n:latest
    container_name: wcic-n8n-worker-2
    restart: unless-stopped
    command: worker
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n_app
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_N8N_PASSWORD}

      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}

      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      QUEUE_BULL_REDIS_DB: 0
      N8N_CONCURRENCY_PRODUCTION_LIMIT: 20

      GENERIC_TIMEZONE: America/Sao_Paulo
      TZ: America/Sao_Paulo
      N8N_LOG_LEVEL: info
    depends_on:
      - n8n
    networks:
      - wcic-network

  # ===========================================================================
  # API REST (Node.js/Express)
  # Expõe endpoints públicos —> lê diretamente do PostgreSQL e Redis
  # Não passa pelo n8n para leituras (latência menor)
  # ===========================================================================
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: wcic-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://wcic_app:${POSTGRES_WCIC_PASSWORD}@postgres:5432/wcic
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      JWT_SECRET: ${API_JWT_SECRET}
      WEBHOOK_SECRET: ${API_WEBHOOK_SECRET}
      RATE_LIMIT_WINDOW_MS: ${API_RATE_LIMIT_WINDOW_MS}
      RATE_LIMIT_MAX: ${API_RATE_LIMIT_MAX}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wcic-network

  # ===========================================================================
  # Prometheus —> Coleta de métricas
  # Scrapes: n8n (/metrics), api (/metrics), postgres_exporter, redis_exporter
  # Retenção: 30 dias (configurado via --storage.tsdb.retention.time)
  # ===========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: wcic-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - wcic-network

  # ===========================================================================
  # Postgres Exporter —> Expõe métricas do PostgreSQL ao Prometheus
  # ===========================================================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: wcic-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${POSTGRES_ROOT_PASSWORD}@postgres:5432/wcic?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wcic-network

  # ===========================================================================
  # Redis Exporter —> Expõe métricas do Redis ao Prometheus
  # ===========================================================================
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: wcic-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - wcic-network

  # ===========================================================================
  # Grafana —> Dashboards de observabilidade
  # Provisioning automático: datasources e dashboards via arquivos em /provisioning
  # ===========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: wcic-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-worldmap-panel,grafana-piechart-panel
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      # Banco de dados do Grafana (usa PostgreSQL em vez de SQLite)
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: grafana_app
      GF_DATABASE_PASSWORD: ${POSTGRES_GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - postgres
    networks:
      - wcic-network

  # ===========================================================================
  # Metabase —> Business Intelligence para times não-técnicos
  # Conectado diretamente ao PostgreSQL wcic (schema wcic, materialized views)
  # ===========================================================================
  metabase:
    image: metabase/metabase:latest
    container_name: wcic-metabase
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_USER: metabase_app
      MB_DB_PASS: ${POSTGRES_METABASE_PASSWORD}
      MB_SITE_NAME: WCIC Analytics
      JAVA_OPTS: "-Xmx512m"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wcic-network

# =============================================================================
# VOLUMES —> dados persistindo fora dos containers
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  n8n_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# =============================================================================
# NETWORKS —> rede de comunicação entre os serviços
# Nenhum serviço está acessível externamente exceto pelas portas declaradas em ports:
# =============================================================================
networks:
  wcic-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
